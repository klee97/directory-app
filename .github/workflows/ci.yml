name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Job 1: Lint + unit tests
  # Runs on every push and every PR to main (~1-2 min)
  # -------------------------------------------------------------------
  unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
  # -------------------------------------------------------------------
  # Job 2: E2E tests
  # Runs only on PRs to main (~5-10 min)
  # Requires these GitHub secrets to be set:
  #   - NEXT_PUBLIC_SUPABASE_URL
  #   - NEXT_PUBLIC_SUPABASE_ANON_KEY
  #   - NEXT_PUBLIC_FEATURE_FAVORITES_ENABLED
  # -------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Cancel any in-progress E2E run for this PR when a new commit is pushed
    concurrency:
      group: e2e-${{ github.head_ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: npx supabase start

      - name: Reset database and seed
        run: npx supabase db reset

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium webkit --with-deps

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # App env vars — mirror these from your Vercel project into GitHub Actions secrets:
          # Settings → Secrets and variables → Actions → New repository secret
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_LOCAL_ANON_KEY }}
          # Add any other required vars here, e.g:
          # NEXT_PUBLIC_SOME_API_KEY: ${{ secrets.NEXT_PUBLIC_SOME_API_KEY }}

          # Test credentials — dedicated Supabase test account
          NEXT_PUBLIC_FEATURE_FAVORITES_ENABLED: "true"

      # Upload Playwright report as an artifact so you can download
      # and inspect it when a test fails in CI
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      # Stop local Supabase
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop
