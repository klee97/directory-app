name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Job 1: Lint + unit tests
  # Runs on every push and every PR to main (~1-2 min)
  # -------------------------------------------------------------------
  unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
  # -------------------------------------------------------------------
  # Job 2: E2E tests
  # Runs only on PRs to main (~5-10 min)
  # Requires these GitHub secrets to be set:
  #   - NEXT_PUBLIC_SUPABASE_URL
  #   - NEXT_PUBLIC_SUPABASE_ANON_KEY
  #   - TEST_USER_EMAIL
  #   - TEST_USER_PASSWORD
  # -------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Cancel any in-progress E2E run for this PR when a new commit is pushed
    concurrency:
      group: e2e-${{ github.head_ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Install Chromium only — matches your playwright.config.ts
      - run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # App env vars — mirror these from your Vercel project into GitHub Actions secrets:
          # Settings → Secrets and variables → Actions → New repository secret
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Add any other required vars here, e.g:
          # NEXT_PUBLIC_SOME_API_KEY: ${{ secrets.NEXT_PUBLIC_SOME_API_KEY }}

          # Test credentials — dedicated Supabase test account
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # Upload Playwright report as an artifact so you can download
      # and inspect it when a test fails in CI
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
